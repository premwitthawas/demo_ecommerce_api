version: "2"
sql:
  - engine: "postgresql"
    queries: "./migrations/product/query/query.sql"
    schema: "./migrations/product/migrations/"
    gen:
      go:
        package: "product_postgresdb"
        out: "./internals/product/adapter/db/postgres/product/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
        emit_json_tags: true
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "timestamptz"
            go_type: "time.Time"
